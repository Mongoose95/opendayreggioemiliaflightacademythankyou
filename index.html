<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iscrizione completata</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #eaf2f8;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      background: white;
      padding: 42px 28px;
      border-radius: 24px;
      text-align: center;
      max-width: 430px;
      width: 100%;
      box-shadow: 0 12px 35px rgba(0,0,0,0.10);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1.15;
      color: #111;
    }

    p {
      margin: 8px 0;
      color: #555;
      font-size: 17px;
      line-height: 1.4;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 30px;
    }

    .icon {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #17324d;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 34px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .icon:hover {
      transform: scale(1.08);
      opacity: 0.9;
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 30px;
      }

      .icon {
        width: 62px;
        height: 62px;
        font-size: 32px;
      }

      .icons {
        gap: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Iscrizione completata ✅</h1>

    <p>Grazie per esserti iscritto all’Open Day del 14 giugno.</p>
    <p>Controlla la tua email per i dettagli.</p>

    <div class="icons">

      <a class="icon"
         href="https://wa.me/393311008783?text=Ciao,%20mi%20sono%20iscritto%20all%27Open%20Day"
         target="_blank"
         aria-label="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
      </a>

      <a class="icon"
         href="https://www.instagram.com/reggioemiliaflightacademy"
         target="_blank"
         aria-label="Instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a class="icon"
         href="https://www.linkedin.com/company/reggio-emilia-flight-academy/"
         target="_blank"
         aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

    </div>
  </div>

</body>
</html>
